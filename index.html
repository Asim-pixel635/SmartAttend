<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartAttend</title>
    <style>
        /* Center everything on the page */
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f4f9;
        }

        /* Card container */
        .container {
            background: white;
            padding: 2rem;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            text-align: center;
            width: 300px;
        }

        h2 {
            margin-bottom: 1.5rem;
            color: #333;
        }

        /* Input field styling */
        input[type="text"] {
            width: 100%;
            padding: 10px;
            margin-bottom: 1rem;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
            font-size: 1rem;
        }

        /* Button styling */
        button {
            width: 100%;
            padding: 10px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.3s ease;
        }

        button:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>SmartAttend</h2>
        
        <!-- Input field for user name -->
        <input type="text" id="name" placeholder="Enter your name">
        
        <!-- Button to mark attendance -->
        <button onclick="markAttendance()">Mark Attendance</button>
    </div>

    <script>
        /**
         * Sends a POST request to the backend with the entered name.
         * Alerts the user on success or error.
         */
        function markAttendance() {
            // Get the value from input and remove extra spaces
            let name = document.getElementById("name").value.trim();

            // Check if name is empty
            if (!name) {
                alert("Please enter your name.");
                return;
            }

            // Send POST request to Flask backend
            fetch("http://127.0.0.1:5000/mark", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ name: name })
            })
            .then(response => {
                // If the server returns an error, throw it
                if (!response.ok) {
                    return response.json().then(err => {
                        throw new Error(err.error || "Something went wrong");
                    });
                }
                return response.json();
            })
            .then(data => {
                // Show success message
                alert(data.message);
            })
            .catch(error => {
                // Show error message
                alert("Error: " + error.message);
            });
        }
    </script>

</body>
</html>
